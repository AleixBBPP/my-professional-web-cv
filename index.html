<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <meta
        name="description"
        content="Aleix Bosch Pérez - Economista e Inversor especializado en análisis financiero, valoración de empresas y mercados."
    >
    <meta
        name="keywords"
        content="economista, inversor, análisis financiero, análisis fundamental, valoración de empresas, mercados financieros, portfolio, Aleix Bosch"
    >
    <meta name="author" content="Aleix Bosch Pérez">
    <meta name="robots" content="index, follow">

    <!-- Open Graph -->
    <meta property="og:title" content="Aleix Bosch Pérez - Economista e Inversor">
    <meta
        property="og:description"
        content="Portfolio profesional de Aleix Bosch Pérez. Economía, inversión, análisis empresarial y proyectos digitales."
    >
    <meta
        property="og:image"
        content="https://aleixbbpp.github.io/CURRICULUMWEB2/assets/images/avatar.jpg"
    >
    <meta property="og:url" content="https://aleixbbpp.github.io/CURRICULUMWEB2/">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_ES">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Aleix Bosch Pérez - Portfolio Profesional">
    <meta
        name="twitter:description"
        content="Economista e inversor especializado en análisis financiero y mercados."
    >
    <meta
        name="twitter:image"
        content="https://aleixbbpp.github.io/CURRICULUMWEB2/assets/images/avatar.jpg"
    >

    <title>Aleix Bosch Pérez - Economista e Inversor | Portfolio Profesional</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="theme-premium">

    <!-- LOADER -->
    <div id="loader" class="loader" aria-hidden="true">
        <div class="spinner"></div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="scroll-progress" id="scroll-progress"></div>

    <!-- NAVBAR -->
    <nav id="navbar" class="navbar">
        <div class="container">
            <a href="#home" class="logo" aria-label="Ir al inicio">
                <span class="logo-mark"></span>
                <span class="logo-text">Aleix Bosch</span>
            </a>

            <button
                class="menu-toggle"
                id="menu-toggle"
                aria-label="Abrir menú"
                aria-expanded="false"
                aria-controls="nav-menu"
            >
                <span></span>
                <span></span>
                <span></span>
            </button>

            <ul class="nav-menu" id="nav-menu">
                <li><a href="#home" class="nav-link">Inicio</a></li>
                <li><a href="#about" class="nav-link">Sobre mí</a></li>
                <li><a href="#analysis" class="nav-link">Análisis</a></li>
                <li><a href="#experience" class="nav-link">Experiencia</a></li>
                <li><a href="#contact" class="nav-link">Contacto</a></li>
            </ul>

            <div class="nav-actions">
                <a href="#contact" class="btn-nav-cta">Contrátame</a>
                <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main id="main-content">

        <!-- HERO -->
        <section id="home" class="section section-home">
            <div class="container">
                <div
                    class="hero-content"
                    id="hero-content"
                    data-aos="fade-up"
                    data-aos-duration="900"
                >
                    <!-- main.js renderiza aquí -->
                </div>
            </div>
        </section>

        <!-- STATS -->
        <section class="section section-stats">
            <div class="container">
                <div class="stats-grid" id="stats-grid">
                    <!-- main.js renderiza aquí -->
                </div>
            </div>
        </section>

        <!-- ABOUT -->
        <section id="about" class="section section-about">
            <div class="container">
                <h2 class="section-title" data-aos="fade-up">Sobre mí</h2>
                <div id="about-content">
                    <!-- main.js renderiza aquí -->
                </div>
            </div>
        </section>

        <!-- EXPERIENCE -->
        <section id="experience" class="section section-experience">
            <div class="container">
                <h2 class="section-title" data-aos="fade-up">Experiencia profesional</h2>
                <div id="experience-content">
                    <!-- main.js renderiza aquí -->
                </div>
            </div>
        </section>
        <!-- ANALYSIS -->
        <section id="analysis" class="section section-analysis">
            <div class="container">
                <h2 class="section-title" data-aos="fade-up">Análisis</h2>
                <div id="analysis-content">
                    <!-- main.js renderiza aquí -->
                </div>
            </div>
        </section>
        <!-- CONTACT -->
        <section id="contact" class="section section-contact">
            <div class="container">
                <h2 class="section-title" data-aos="fade-up">Contacto</h2>
                <div id="contact-content">
                    <!-- main.js renderiza aquí -->
                </div>
            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer class="footer" id="footer">
        <!-- main.js renderiza aquí -->
    </footer>

    <!-- MODAL PROYECTO -->
    <div id="project-modal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <button class="modal-close" id="modal-close" aria-label="Cerrar modal">&times;</button>
            <div id="modal-body">
                <!-- main.js renderiza aquí -->
            </div>
        </div>
    </div>

    <!-- BACK TO TOP -->
    <button class="back-to-top" id="back-to-top" aria-label="Volver arriba">
        ↑
    </button>

    <!-- SCRIPTS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
